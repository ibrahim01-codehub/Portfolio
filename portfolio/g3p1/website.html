<!DOCTYPE html>
<html>
    <head>
        <title>rock-paper-sicor</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon"  href="favicon.jpg">
    </head>

    <body>
        <div class="game-elements">

            <button class="buttons" id="rock">
                <img src="rock.png" alt=""></button>

            <button class="buttons" id="paper">
                <img src="paper.png" alt=""></button>

            <button class="buttons" id="siccor">
                <img src="siccor.png" alt=""></button>
        </div>

        <div class="game-info">
            <br>
            <p id="player-choice">Player choice: </p>
            <p id="computer-choice">Computer choice: </p>
            <p id="winner">Winner: </p>
            <p id="player-score">Player score: </p>
            <p id="computer-score">Computer score: </p>
        </div>

        <script src="script.js"></script>
    </body>
</html>
